document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}\n  html{height:100%}\n  body{margin:0;min-height:100dvh;background:#ECF5F5;font-family:'Mulish',system-ui,sans-serif;overscroll-behavior-y:none}\n  a{color:var(--accent,#559A9E);text-decoration:none}\n  a:hover{color:var(--accent-hover,#48858a)}\n  input,button,textarea{font-family:inherit}\n  input:focus{outline:none;border-color:var(--accent-strong,#63A6AA)}\n  ::placeholder{color:var(--muted-l,#A6BCBC)}\n  @keyframes waveMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}\n  @keyframes breathe{0%,100%{transform:scale(1);opacity:.30}50%{transform:scale(1.16);opacity:.55}}\n  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}\n  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}\n  @keyframes fadeOut{from{opacity:1}to{opacity:0}}\n  @keyframes sheetDown{from{transform:none}to{transform:translateY(100%)}}\n  ::-webkit-scrollbar{width:0;height:0}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"{{ themeWrap }}\">\n  <input id=\"lullPhotoInput\" type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ onPhotoPick }}\" style=\"display:none\">\n  <div style=\"position:relative;width:100%;max-width:520px;margin:0 auto;min-height:100dvh;background:var(--screen,#ECF5F5)\">\n\n      <sc-if value=\"{{ isWelcome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div data-screen-label=\"Welcome\" style=\"min-height:100dvh;background:radial-gradient(120% 78% at 50% 12%, var(--g1,#F2F9F9), var(--g2,#E2EEEE) 68%, var(--g3,#D3E6E6));display:flex;flex-direction:column;align-items:center;padding:calc(env(safe-area-inset-top, 0px) + 96px) 34px calc(env(safe-area-inset-bottom, 0px) + 36px);text-align:center;animation:fadeIn .5s ease\">\n          <div style=\"position:relative;width:76px;height:76px;border-radius:50%;background:var(--warm,#D2E6E6);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 34px rgba(60,100,100,.20);margin-bottom:28px\">\n            <div style=\"width:27px;height:27px;background:linear-gradient(160deg,#F8EED8,#E4CFA2);border-radius:50% 50% 50% 3px;transform:rotate(45deg);box-shadow:inset 0 1px 3px rgba(255,255,255,.7)\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'Cormorant Garamond',serif;font-size:60px;font-weight:600;color:var(--ink,#28403F);line-height:.95;letter-spacing:.01em\">Lull<\u002Fdiv>\n          <div style=\"font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted-m,#90A8A8);margin-top:14px;font-weight:600\">a pumping spa<\u002Fdiv>\n          <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;line-height:1.45;color:var(--ink-soft,#567070);margin:38px 0 0;max-width:290px\">A quiet room for you and your body — no scoreboards, no strangers, no pressure to be more than you already are.<\u002Fp>\n          <div style=\"flex:1;min-height:32px\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ startOnboard }}\" style=\"width:100%;padding:17px;border:none;border-radius:18px;background:var(--accent,#559A9E);color:var(--on-accent,#F4FAFA);font-size:16px;font-weight:600;letter-spacing:.03em;cursor:pointer;box-shadow:0 10px 26px rgba(60,110,110,.30)\" style-hover=\"width:100%;padding:17px;border:none;border-radius:18px;background:var(--accent-hover,#48858a);color:var(--on-accent,#F4FAFA);font-size:16px;font-weight:600;letter-spacing:.03em;cursor:pointer;box-shadow:0 10px 26px rgba(60,110,110,.30)\">Begin<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ skipToHome }}\" style=\"margin-top:16px;background:none;border:none;color:var(--muted-m,#90A8A8);font-size:13.5px;font-weight:500;cursor:pointer;letter-spacing:.02em;padding:10px\">I've been here before<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isSurvey }}\">\n        <div data-screen-label=\"Your details\" style=\"min-height:100dvh;padding:calc(env(safe-area-inset-top, 0px) + 46px) 24px calc(env(safe-area-inset-bottom, 0px) + 36px);animation:fadeIn .45s ease\">\n          <button sc-camel-on-click=\"{{ backToWelcome }}\" style=\"width:44px;height:44px;border-radius:50%;border:1px solid rgba(40,64,63,.14);background:var(--surface,#F5FBFB);color:var(--ink-soft,#567070);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:22px\">←<\u002Fbutton>\n          <div style=\"font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted-m,#90A8A8);font-weight:600;margin-bottom:10px\">Your details<\u002Fdiv>\n          <h1 style=\"font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;color:var(--ink,#28403F);line-height:1.02;margin:0 0 8px\">Let's get<br>acquainted.<\u002Fh1>\n          <p style=\"font-size:14.5px;line-height:1.5;color:var(--muted-d,#789191);margin:0 0 28px\">A few gentle details. Nothing here is a test, and nothing is graded.<\u002Fp>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px\">\n            <div>\n              <label style=\"display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-m,#90A8A8);font-weight:600;margin-bottom:8px\">Your name<\u002Flabel>\n              <input value=\"{{ momName }}\" sc-camel-on-change=\"{{ onMomName }}\" placeholder=\"Maya\" style=\"width:100%;padding:14px 15px;border:1px solid rgba(40,64,63,.14);border-radius:14px;background:var(--surface,#F5FBFB);font-size:16px;color:var(--ink,#28403F)\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-m,#90A8A8);font-weight:600;margin-bottom:8px\">Baby's name<\u002Flabel>\n              <input value=\"{{ babyName }}\" sc-camel-on-change=\"{{ onBabyName }}\" placeholder=\"Wren\" style=\"width:100%;padding:14px 15px;border:1px solid rgba(40,64,63,.14);border-radius:14px;background:var(--surface,#F5FBFB);font-size:16px;color:var(--ink,#28403F)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px\">\n            <div>\n              <label style=\"display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-m,#90A8A8);font-weight:600;margin-bottom:8px\">Your birthday<\u002Flabel>\n              <input type=\"date\" value=\"{{ momDob }}\" sc-camel-on-change=\"{{ onMomDob }}\" style=\"width:100%;padding:13px 15px;border:1px solid rgba(40,64,63,.14);border-radius:14px;background:var(--surface,#F5FBFB);font-size:16px;color:var(--ink,#28403F)\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-m,#90A8A8);font-weight:600;margin-bottom:8px\">Baby's birthday<\u002Flabel>\n              <input type=\"date\" value=\"{{ babyDob }}\" sc-camel-on-change=\"{{ onBabyDob }}\" style=\"width:100%;padding:13px 15px;border:1px solid rgba(40,64,63,.14);border-radius:14px;background:var(--surface,#F5FBFB);font-size:16px;color:var(--ink,#28403F)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-bottom:20px\">\n            <label style=\"display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-m,#90A8A8);font-weight:600;margin-bottom:8px\">Email<\u002Flabel>\n            <input type=\"email\" value=\"{{ email }}\" sc-camel-on-change=\"{{ onEmail }}\" placeholder=\"you@example.com\" style=\"width:100%;padding:14px 15px;border:1px solid rgba(40,64,63,.14);border-radius:14px;background:var(--surface,#F5FBFB);font-size:16px;color:var(--ink,#28403F)\">\n          <\u002Fdiv>\n\n          <button sc-camel-on-click=\"{{ toggleOptOut }}\" style=\"width:100%;display:flex;align-items:flex-start;gap:12px;text-align:left;background:var(--surface2,#E6F0F0);border:1px solid rgba(40,64,63,.10);border-radius:16px;padding:15px 16px;cursor:pointer;margin-bottom:30px\">\n            <div style=\"position:relative;flex:none;width:22px;height:22px;border-radius:7px;border:1.6px solid var(--accent-strong,#63A6AA);background:var(--surface,#F5FBFB);display:flex;align-items:center;justify-content:center;margin-top:1px\">\n              <sc-if value=\"{{ optOut }}\"><div style=\"position:absolute;inset:0;background:var(--accent,#559A9E);border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--on-accent,#F4FAFA);font-size:13px;font-weight:700\">✓<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n            <span style=\"font-size:13.5px;line-height:1.45;color:var(--ink-soft,#567070)\">Please keep marketing emails out of my sacred inbox. <span style=\"color:var(--muted-m,#90A8A8)\">(You can always change your mind.)<\u002Fspan><\u002Fspan>\n          <\u002Fbutton>\n\n          <button sc-camel-on-click=\"{{ submitSurvey }}\" style=\"width:100%;padding:17px;border:none;border-radius:18px;background:var(--accent,#559A9E);color:var(--on-accent,#F4FAFA);font-size:16px;font-weight:600;letter-spacing:.03em;cursor:pointer;box-shadow:0 10px 26px rgba(60,110,110,.28)\">Continue<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isQuiz }}\">\n        <div data-screen-label=\"Quiz\" style=\"min-height:100dvh;padding:calc(env(safe-area-inset-top, 0px) + 46px) 24px calc(env(safe-area-inset-bottom, 0px) + 36px);display:flex;flex-direction:column;animation:fadeIn .4s ease\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:30px\">\n            <button sc-camel-on-click=\"{{ quizBack }}\" style=\"width:44px;height:44px;border-radius:50%;border:1px solid rgba(40,64,63,.14);background:var(--surface,#F5FBFB);color:var(--ink-soft,#567070);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none\">←<\u002Fbutton>\n            <div style=\"display:flex;gap:7px;flex:1\">\n              <sc-for list=\"{{ quizDots }}\" as=\"dot\" hint-placeholder-count=\"3\">\n                <div style=\"{{ dot.style }}\"><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <span style=\"font-size:12px;color:var(--muted-m,#90A8A8);font-weight:600;letter-spacing:.04em\">{{ quizIndex }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <h1 style=\"font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--ink,#28403F);line-height:1.08;margin:0 0 8px\">{{ quizTitle }}<\u002Fh1>\n          <p style=\"font-size:14.5px;line-height:1.5;color:var(--muted-d,#789191);margin:0 0 26px\">{{ quizSub }}<\u002Fp>\n\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n            <sc-for list=\"{{ quizOptions }}\" as=\"opt\" hint-placeholder-count=\"6\">\n              <button sc-camel-on-click=\"{{ opt.onClick }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"flex:1;min-height:28px\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ quizNext }}\" style=\"width:100%;padding:17px;border:none;border-radius:18px;background:var(--accent,#559A9E);color:var(--on-accent,#F4FAFA);font-size:16px;font-weight:600;letter-spacing:.03em;cursor:pointer;box-shadow:0 10px 26px rgba(60,110,110,.28)\">{{ quizNextLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isQuizResult }}\">\n        <div data-screen-label=\"Quiz result\" style=\"min-height:100dvh;background:radial-gradient(120% 70% at 50% 14%, var(--g1,#F2F9F9), var(--g2,#E2EEEE) 70%, var(--g3,#D3E6E6));padding:calc(env(safe-area-inset-top, 0px) + 80px) 30px calc(env(safe-area-inset-bottom, 0px) + 36px);display:flex;flex-direction:column;animation:fadeIn .5s ease\">\n          <div style=\"font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted-m,#90A8A8);font-weight:600;margin-bottom:16px\">Here's where you are<\u002Fdiv>\n          <h1 style=\"font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:var(--ink,#28403F);line-height:1.02;margin:0 0 22px\">We hear you,<br>{{ resultName }}.<\u002Fh1>\n          <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:21px;line-height:1.5;color:var(--ink-soft,#567070);margin:0 0 18px\">You didn't come here to hit a number. You came to feel like yourself again.<\u002Fp>\n          <p style=\"font-size:15px;line-height:1.6;color:var(--muted-d,#789191);margin:0\">So that's what Lull does — it holds the quiet, keeps the count out of sight, and reminds you that you and your milk are not the same measure of your worth. {{ resultLine }}<\u002Fp>\n          <div style=\"flex:1;min-height:32px\"><\u002Fdiv>\n          <button sc-camel-on-click=\"{{ enterSpa }}\" style=\"width:100%;padding:17px;border:none;border-radius:18px;background:var(--accent,#559A9E);color:var(--on-accent,#F4FAFA);font-size:16px;font-weight:600;letter-spacing:.03em;cursor:pointer;box-shadow:0 10px 26px rgba(60,110,110,.28)\">Enter the spa<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isHome }}\">\n        <div data-screen-label=\"Home\" style=\"min-height:100dvh;padding:calc(env(safe-area-inset-top, 0px) + 46px) 22px calc(env(safe-area-inset-bottom, 0px) + 30px);animation:fadeIn .45s ease\">\n          <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:2px\">\n            <sc-if value=\"{{ showHomePhoto }}\">\n              <div style=\"width:54px;height:54px;flex:none;border-radius:50%;overflow:hidden;box-shadow:0 6px 16px rgba(60,110,110,.16);border:2px solid var(--surface,#F5FBFB)\">\n                <div style=\"{{ babyPhotoBg }}\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"font-size:14px;color:var(--muted-m,#90A8A8);font-weight:500;letter-spacing:.01em\">{{ greetingTime }},<\u002Fdiv>\n              <div style=\"font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:600;color:var(--ink,#28403F);line-height:1;margin-top:2px\">{{ greetName }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button sc-camel-on-click=\"{{ goSettings }}\" aria-label=\"Settings\" style=\"width:46px;height:46px;flex:none;border-radius:50%;border:1px solid rgba(40,64,63,.12);background:var(--tint,#DCEDED);color:var(--accent,#559A9E);cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;display:flex;align-items:center;justify-content:center\">{{ momInitial }}<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:26px;background:var(--surface,#F5FBFB);border:1px solid rgba(40,64,63,.09);border-radius:24px;padding:24px 22px;box-shadow:0 8px 26px rgba(60,110,110,.08)\">\n            <div style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-soft,#95C5C8);font-weight:600;margin-bottom:12px\">Today's whisper<\u002Fdiv>\n            <p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:23px;line-height:1.38;color:var(--ink2,#314C4C);margin:0\">{{ todays }}<\u002Fp>\n          <\u002Fdiv>\n\n          <button sc-camel-on-click=\"{{ begin }}\" style=\"width: 100%; margin-top: 16px; text-align: left; padding: 22px; border: none; border-radius: 26px; background: linear-gradient(135deg, var(--accent-soft,#95C5C8), var(--accent-deep,#3F7E82)); cursor: pointer; display: flex; align-items: center; gap: 16px; box-shadow: 0 14px 34px rgba(60,110,110,.30)\">\n            <div style=\"position:relative;width:56px;height:56px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.18);flex:none;border:1px solid rgba x;flex-direction:column;align-items:center;gap:12px;background:var(--surface,#F5FBFB);border:1px solid rgba(40,64,63,.09);border-radius:22px;padding:18px 22px;box-shadow:0 10px 26px rgba(60,110,110,.08);animation:fadeIn .3s ease\">\n              <div style=\"font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-m,#90A8A8);font-weight:600\">Gentle chime when you reach<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:18px\">\n                <button sc-camel-on-click=\"{{ chimeDec }}\" style=\"width:44px;height:44px;flex:none;border-radius:50%;border:1.5px solid rgba(40,64,63,.16);background:transparent;color:var(--ink-soft,#567070);font-size:19px;cursor:pointer\">−<\u002Fbutton>\n                <div style=\"font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;color:var(--ink2,#314C4C);min-width:96px;text-align:center\">{{ chimeSetLabel }}<\u002Fdiv>\n                <button sc-camel-on-click=\"{{ chimeInc }}\" style=\"width:44px;height:44px;flex:none;border-radius:50%;border:1.5px solid rgba(40,64,63,.16);background:transparent;color:var(--ink-soft,#567070);font-size:19px;cursor:pointer\">+<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-size:12.5px;line-height:1.45;color:var(--muted-d,#789191);text-align:center;max-width:230px\">No countdown, no cut-off. Set it and forget it — stay as long as you like.<\u002Fdiv>\n              <button sc-camel-on-click=\"{{ closeChimeSetup }}\" style=\"margin-top:2px;background:none;border:none;color:var(--muted-m,#90A8A8);font-size:12.5px;font-weight:600;cursor:pointer;padding:6px 4px\">done<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"flex:1;min-height:24px\"><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;width:100%\">\n            <button sc-camel-on-click=\"{{ pauseResume }}\" style=\"flex:1;padding:16px;border:1.5px solid rgba(40,64,63,.16);border-radius:17px;background:transpar ize:14px;color:var(--ink-soft,#567070);font-weight:600;margin-bottom:9px\">How did it feel?<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px\">\n              <sc-for list=\"{{ moodChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n                <button sc-camel-on-click=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:14px;color:var(--ink-soft,#567070);font-weight:600;margin-bottom:9px\">What was with you?<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n              <sc-for list=\"{{ condChips }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <button sc-camel-on-click=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ ozClosed }}\">\n              <button sc-camel-on-click=\"{{ openOz }}\" style=\"margin-top:18px;background:none;border:none;padding:8px 0 2px;color:var(--muted-m,#90A8A8);font-size:13px;font-weight:600;cursor:pointer;border-bottom:1px dashed rgba(144,168,168,.5)\">note the ounces — only if it serves you<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ ozIsOpen }}\">\n              <div style=\"margin-top:18px;display:flex;align-items:center;gap:14px\">\n                <button sc-camel-on-click=\"{{ ozMinus }}\" style=\"width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(40,64,63,.16);background:var(--surface,#F5FBFB);color:var(--ink-soft,#567070);font-size:18px;cursor:pointer\">−<\u002Fbutton>\n                <div style=\"font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--ink2,#314C4C);min-width:74px;text-align:center\">{{ ozLabel }}<\u002Fdiv>\n                <button sc-camel-on-click=\"{{ ozPlus }}\" style=\"width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(40,64,63,.16);background:var(--surface,#F5FBFB);color:var(--ink-soft,#567070);font-size:18px;cursor:pointer\">+<\u002Fbutton>\n                <button sc-camel-on-click=\"{{ ozClear }}\" style=\"margin-left:auto;background:none;border:none;color:var(--muted-m,#90A8A8);font-size:12.5px;font-weight:600;cursor:pointer;padding:10px 0\">never mind<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--muted-m,#90A8A8);margin-top:10px\">Tucked behind the curtain. It says nothing about you.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ needTap }}\">\n            <button sc-camel-on-click=\"{{ toggleReveal }}\" style=\"width:100%;padding:16px;border:1px dashed rgba(144,168,168,.55);border-radius:18px;background:var(--surface,#F5FBFB);color:var(--muted-d,#789191);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:14px\">Show me the numbers <span style=\"color:var(--muted-l,#A6BCBC);font-weight:400\">(if you must)<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ showReveal }}\">\n            <div style=\"width:100%;background:var(--surface,#F5FBFB);border:1px solid rgba(40,64,63,.09);border-radius:20px;padding:22px;margin-bottom:14px\">\n              <div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:var(--ink2,#314C4C)\">{{ completeMinutes }}<\u002Fdiv>\n              <sc-if value=\"{{ completeOzShow }}\"><div style=\"font-size:14px;color:var(--accent,#559A9E);font-weight:600;margin-top:6px\">{{ completeOz }}<\u002Fdiv><\u002Fsc-if>\n              <div style=\"font-size:13px;color:var(--muted-m,#90A8A8);margin-top:8px;line-height:1.4;font-style:italic;font-family:'Cormorant Garamond',serif\">And that's the only number worth keeping.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ moodPicked }}\">\n            <button s se the door.\",\n      \"Nothing good has to be forced.\",\n    ],\n    default: [\n      \"You are allowed to take this time.\",\n      \"Whatever comes today is welcome.\",\n      \"This session does not define you.\",\n      \"Comfort comes before suction.\",\n      \"You are allowed to do nothing but breathe.\",\n      \"Slow breaths, warm shoulders, and the milk will come.\",\n      \"You are doing meaningful work.\",\n      \"One session is only one moment.\",\n      \"Be soft with yourself here.\",\n      \"The pump is a tool, not a judge.\",\n    ],\n  };\n\n  poolFor(mood) { return this.vesselPools[mood] || this.vesselPools.default; }\n  startVessel(mood) {\n    this.stopVessel();\n    const m = mood || this.state.enterMood;\n    const pool = this.poolFor(m);\n    const opener = (m && this.enteringLines[m]) || pool[Math.floor(Math.random() * pool.length)];\n    this.setState({ vesselText: opener, vesselVis: true, vesselRecent: [opener] });\n    this.vtid = setInterval(() => {\n      this.setState({ vesselVis: false });\n      this.vswap = setTimeout(() => {\n        this.setState(s => {\n          const recent = s.vesselRecent || [];\n          let candidates = pool.filter(p => !recent.includes(p));\n          if (candidates.length === 0) candidates = pool.filter(p => p !== s.vesselText);\n          if (candidates.length === 0) candidates = pool;\n          const n = candidates[Math.floor(Math.random() * candidates.length)];\n          return { vesselText: n, vesselVis: true, vesselRecent: [...recent, n].slice(-4) };\n        });\n      }, 1400);\n    }, 15000);\n  }\n  stopVessel() {\n    if (this.vtid) { clearInterval(this.vtid); this.vtid = null; }\n    if (this.vswap) { clearTimeout(this.vswap); this.vswap = null; }\n  }\n\n  reasonOpts = [\n    { id: 'calm', label: 'Find calm while I pump' },\n    { id: 'number', label: 'Stop chasing the number' },\n    { id: 'alone', label: 'Feel less alone' },\n    { id: 'guilt', label: 'Ease the guilt' },\n    { id:
